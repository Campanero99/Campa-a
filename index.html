<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASICS Banner</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --orange: #ff6b1a;
  --gold:   #ffcc00;
  --blue:   #1a3faa;
  --electric: #2d6fff;
}

html, body {
  width: 100%;
  margin: 0; padding: 0;
  background: #ff6b1a;
}

.pancarta {
  width: 100%;
  display: block;
  overflow: hidden;
}

/* ── FOTO ─────────────────────────────── */
.photo-block {
  position: relative;
  width: 100%;
  aspect-ratio: 3/2.6;
  overflow: hidden;
}
.photo-block img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center 25%;
  display: block;
}
.photo-overlay {
  position: absolute;
  inset: 0;
  z-index: 1;
  background: linear-gradient(
    to bottom,
    rgba(255,255,255,0.02) 0%,
    rgba(10,16,40,0.08) 48%,
    rgba(255,107,26,0.45) 78%,
    rgba(255,107,26,0.75) 100%
  );
}

/* ESTRELLAS */
.star {
  position: absolute; color: var(--gold); z-index: 4;
  animation: starPop 2.8s ease-in-out infinite;
  filter: drop-shadow(0 0 8px rgba(255,204,0,1));
}
@keyframes starPop {
  0%,100% { transform: scale(1) rotate(0deg); }
  50%      { transform: scale(1.5) rotate(20deg); }
}

/* CONFETTI */
.confetti { position: absolute; inset: 0; z-index: 2; pointer-events: none; overflow: hidden; }
.c { position: absolute; border-radius: 50%; animation: cfloat linear infinite; }
@keyframes cfloat {
  0%   { transform: translateY(110%); opacity: 0; }
  10%  { opacity: .8; }
  90%  { opacity: .8; }
  100% { transform: translateY(-10%); opacity: 0; }
}

/* TEXTO SOBRE FOTO */
.photo-title {
  position: absolute; bottom: 16px; left: 0; right: 0; z-index: 3;
  display: flex; flex-direction: column; align-items: center;
  padding: 0 10px;
}
.photo-title h1 {
  font-family: "Bebas Neue", sans-serif;
  font-size: clamp(1.1rem, 5vw, 1.6rem);
  line-height: 1.05;
  color: white;
  letter-spacing: 2px;
  text-align: center;
  white-space: nowrap;
  margin-bottom: 8px;
  text-shadow: 0 3px 18px rgba(0,0,0,0.9);
}
.glow {
  background: linear-gradient(90deg, var(--gold), var(--orange));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.badge-asics {
  display: inline-flex; align-items: center; gap: 7px;
  background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.4);
  border-radius: 30px; padding: 4px 14px; backdrop-filter: blur(10px);
}
.badge-asics span {
  font-family: "Bebas Neue", sans-serif; color: white;
  font-size: 0.85rem; letter-spacing: 3px;
}
.ldot { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); }

/* ── CINTA ────────────────────────────── */
.tape {
  height: 14px;
  background: repeating-linear-gradient(
    90deg, #1a3faa 0, #1a3faa 38px, #ffcc00 38px, #ffcc00 76px
  );
  animation: tapeMove 0.7s linear infinite;
}
@keyframes tapeMove { to { background-position: 76px 0; } }

/* ── BLOQUE INFERIOR ─────────────────── */
.bottom {
  background: #ff6b1a;
  padding: 18px 28px 24px;
  width: 100%;
  text-align: center;
  color: white;
}

.t-slogan {
  font-family: "Bebas Neue", sans-serif;
  font-size: clamp(1.4rem, 6.5vw, 2rem);
  color:  #1a3faa;
  letter-spacing: 2px;
  display: block;
  text-align: center;
  line-height: 1.1;
}
.t-slogan .sep { color: var(--orange); }

.t-sub {
  font-family: "DM Sans", sans-serif;
  font-size: clamp(0.85rem, 3.5vw, 1.1rem);
  font-weight: 700;
  color: #0a1a6e;
  display: block;
  text-align: center;
  margin-top: 2px;
}
.t-sub span { color: var(--orange); }

.divider {
  width: 60%; height: 2px; margin: 12px auto;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
}

.euro-row {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  margin: 4px 0 10px;
}
.euro-line {
  flex: 1; height: 1px; max-width: 44px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
}
.euro-inner { display: flex; align-items: center; gap: 10px; }
.euro-num {
  font-family: "Bebas Neue", sans-serif; font-size: 3rem; line-height: 1;
  background: linear-gradient(135deg, #0a1a6e, #1a3faa);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.euro-text {
  border-left: 2px solid rgba(255,255,255,0.5);
  padding-left: 14px; text-align: left;
}
.euro-text strong {
  display: block; font-family: "Bebas Neue", sans-serif;
  font-size: 0.82rem; letter-spacing: 2px; color: #1a3faa; line-height: 1.3;
}

.t-tagline {
  font-family: "DM Sans", sans-serif;
  font-size: clamp(0.85rem, 3.5vw, 1.1rem);
  font-weight: 700;
  font-style: italic;
  color: #1a3faa;;
  display: block; text-align: center;
  line-height: 1.4;
  padding: 0 8px;
}

.t-clock {
  font-family: "Bebas Neue", sans-serif;
  font-size: 1.8rem; letter-spacing: 4px;
  color: #1a3faa;
  -webkit-text-fill-color: #1a3faa;
  text-shadow: 0 2px 10px rgba(26,63,170,0.15);
  display: block; text-align: center;
  margin: 4px 0 8px;
}

.cta-btn {
  background: white;
  color: #ff6b1a;
  font-family: "Bebas Neue", sans-serif;
  font-size: 1.1rem; letter-spacing: 3px;
  padding: 11px 40px; border-radius: 50px;
  border: none; cursor: pointer;
  box-shadow: 0 6px 24px rgba(10,26,110,0.35);
  margin-top: 10px;
}

/* ── FRANJA ───────────────────────────── */
.stripe-bot {
  height: 7px;
  background: linear-gradient(90deg, var(--blue), var(--electric), var(--gold), var(--orange), #ff2d55, var(--gold));
  background-size: 200% 100%;
  animation: shimmer 2.5s linear infinite;
}
@keyframes shimmer { to { background-position: 200% 0; } }
</style>
</head>
